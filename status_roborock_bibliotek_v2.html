<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roborock — Biblioteket</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d1a;
      color: #e0e0f0;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #1a1a3e 0%, #0d0d1a 100%);
      border-bottom: 1px solid #2a2a5a;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-logo { font-size: 2rem; }
    .header-title { font-size: 1.2rem; font-weight: 700; color: #fff; }
    .header-sub { font-size: 0.75rem; color: #7070aa; margin-top: 2px; }
    #last-updated { font-size: 0.75rem; color: #5050aa; text-align: right; }

    /* HERO */
    .hero {
      background: linear-gradient(160deg, #1a1a3e 0%, #12122a 60%, #0d0d1a 100%);
      border-bottom: 1px solid #2a2a5a;
      padding: 40px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 60px;
      flex-wrap: wrap;
    }

    .robot-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .robot-glow {
      width: 200px;
      height: 200px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: radial-gradient(circle, #2a2a6a 0%, #1a1a3e 70%);
      box-shadow: 0 0 40px rgba(108, 99, 255, 0.3);
      transition: box-shadow 0.5s;
      overflow: hidden;
    }

    .robot-glow img {
      width: 190px;
      height: 190px;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.6));
    }

    .robot-glow.cleaning {
      box-shadow: 0 0 60px rgba(0, 212, 170, 0.6);
      animation: pulse 2s infinite;
    }

    .robot-glow.error {
      box-shadow: 0 0 60px rgba(255, 80, 80, 0.6);
      animation: pulse-red 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 40px rgba(0, 212, 170, 0.4); }
      50% { box-shadow: 0 0 80px rgba(0, 212, 170, 0.8); }
    }

    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 40px rgba(255, 80, 80, 0.4); }
      50% { box-shadow: 0 0 80px rgba(255, 80, 80, 0.9); }
    }

    .status-badge {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 3px solid #0d0d1a;
    }

    .hero-info { text-align: center; }
    .hero-status-text {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .hero-sub { font-size: 0.9rem; color: #7070aa; }

    .next-run-pill {
      display: inline-block;
      margin-top: 14px;
      background: #1a1a3e;
      border: 1px solid #3a3a6a;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.82rem;
      color: #9090cc;
    }

    .next-run-pill span { color: #b0b0ff; font-weight: 600; }

    /* BATTERY RING */
    .battery-ring-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .battery-ring {
      position: relative;
      width: 110px;
      height: 110px;
    }

    .battery-ring svg {
      transform: rotate(-90deg);
    }

    .battery-ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .battery-pct {
      font-size: 1.5rem;
      font-weight: 800;
    }

    .battery-lbl {
      font-size: 0.65rem;
      color: #7070aa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .battery-ring-title { font-size: 0.75rem; color: #7070aa; }

    /* GRID */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 20px;
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr 1fr 1fr;
    }

    @media (max-width: 700px) {
      main { grid-template-columns: 1fr; }
      .hero { gap: 30px; padding: 28px 20px; }
    }

    @media (max-width: 960px) and (min-width: 701px) {
      main { grid-template-columns: 1fr 1fr; }
    }

    /* CARDS */
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 22px;
      transition: border-color 0.3s;
    }

    .card:hover { border-color: #4a4a8a; }
    .card.full-width { grid-column: 1 / -1; }

    .card-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5050aa;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2a2a4a;
    }

    /* INFO ROWS */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1f1f3a;
      font-size: 0.95rem;
    }

    .info-row:last-child { border-bottom: none; }
    .info-label { color: #7070aa; }
    .info-value { font-weight: 700; color: #e0e0ff; }

    /* SENSOR ITEMS */
    .sensor-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 0.88rem;
      border: 1px solid transparent;
    }

    .sensor-item:last-child { margin-bottom: 0; }

    .sensor-ok {
      background: rgba(0, 180, 100, 0.08);
      border-color: rgba(0, 180, 100, 0.2);
      color: #60d090;
    }

    .sensor-warn {
      background: rgba(255, 80, 80, 0.1);
      border-color: rgba(255, 80, 80, 0.3);
      color: #ff7070;
    }

    .sensor-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green { background: #00d470; box-shadow: 0 0 8px rgba(0, 212, 112, 0.6); }
    .dot-red { background: #ff5050; box-shadow: 0 0 8px rgba(255, 80, 80, 0.6); }

    /* ERROR BANNER */
    .error-banner {
      grid-column: 1 / -1;
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.4);
      border-radius: 12px;
      padding: 16px 20px;
      color: #ff8080;
      font-weight: 600;
      font-size: 0.95rem;
      display: none;
      animation: pulse-red 2s infinite;
    }

    .error-banner.visible { display: block; }

    #loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px;
      color: #4040aa;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-logo">🤖</div>
    <div>
      <div class="header-title">Roborock Qrevo S</div>
      <div class="header-sub">Biblioteket — Siljan kommune</div>
    </div>
  </div>
  <div id="last-updated">Henter data...</div>
</header>

<div class="hero" id="hero">
  <div class="robot-wrap">
    <div class="robot-glow" id="robot-glow">
      <img src="roborock.png" alt="Roborock Qrevo S">
      <span class="status-badge" id="status-badge"></span>
    </div>
  </div>
  <div class="hero-info">
    <div class="hero-status-text" id="hero-status">—</div>
    <div class="hero-sub" id="hero-sub">Henter status...</div>
    <div class="next-run-pill" id="next-run-pill"></div>
  </div>
  <div class="battery-ring-wrap">
    <div class="battery-ring">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="46" fill="none" stroke="#2a2a4a" stroke-width="10"/>
        <circle cx="55" cy="55" r="46" fill="none" stroke-width="10"
          stroke-linecap="round"
          stroke-dasharray="289"
          id="battery-arc"
          stroke="#00d470"
          stroke-dashoffset="289"/>
      </svg>
      <div class="battery-ring-label">
        <span class="battery-pct" id="battery-pct">—</span>
        <span class="battery-lbl">Batteri</span>
      </div>
    </div>
    <div class="battery-ring-title" id="charging-label"></div>
  </div>
</div>

<main id="main">
  <div id="loading">Laster status...</div>
</main>

<script>
const SUPA_URL = "https://fdqjiubwnohtucpercro.supabase.co";
const SUPA_KEY_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZkcWppdWJ3bm9odHVjcGVyY3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMzMwOTAsImV4cCI6MjA4OTkwOTA5MH0.31n5oId96UEOB7Hf-rSCJ_DG57SNWNPJfeiCFDbW_vQ";
const SUPA_KEY = SUPA_KEY_ANON;

const VACUUM_LABELS = {
  docked:    "Parkert i ladestasjon",
  charging:  "Lader",
  cleaning:  "Rengjør nå",
  returning: "Returnerer",
  idle:      "Inaktiv",
  paused:    "Pauset",
  error:     "FEIL — Krever oppmerksomhet",
};

function vacuumColor(state) {
  if (state === "cleaning") return "#00d4aa";
  if (state === "error")    return "#ff5050";
  if (state === "docked" || state === "charging") return "#00d470";
  return "#7070aa";
}

function batteryColor(pct) {
  if (pct >= 60) return "#00d470";
  if (pct >= 30) return "#ffaa00";
  return "#ff5050";
}

function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  const dd  = String(d.getDate()).padStart(2, "0");
  const mm  = String(d.getMonth() + 1).padStart(2, "0");
  const hh  = String(d.getHours()).padStart(2, "0");
  const min = String(d.getMinutes()).padStart(2, "0");
  return `${dd}.${mm} kl. ${hh}:${min}`;
}

function nextRun() {
  const scheduleDays = [0, 3];
  const scheduleHour = 22;
  const now   = new Date();
  const today = now.getDay();
  const hour  = now.getHours();

  let minDays = 8;
  for (const day of scheduleDays) {
    let diff = day - today;
    if (diff < 0) diff += 7;
    if (diff === 0 && hour >= scheduleHour) diff = 7;
    if (diff < minDays) minDays = diff;
  }

  const next = new Date(now);
  next.setDate(now.getDate() + minDays);
  next.setHours(scheduleHour, 0, 0, 0);

  const dayNames = ["søndag","mandag","tirsdag","onsdag","torsdag","fredag","lørdag"];
  const dd = String(next.getDate()).padStart(2, "0");
  const mm = String(next.getMonth() + 1).padStart(2, "0");

  if (minDays === 0) return `I dag kl. ${scheduleHour}:00`;
  if (minDays === 1) return `I morgen kl. ${scheduleHour}:00`;
  return `${dayNames[next.getDay()].charAt(0).toUpperCase() + dayNames[next.getDay()].slice(1)} ${dd}.${mm} kl. ${scheduleHour}:00`;
}

function sensorRow(label, value, warnWhen) {
  const isWarn = value === warnWhen;
  const cls  = isWarn ? "sensor-warn" : "sensor-ok";
  const dot  = isWarn ? "dot-red" : "dot-green";
  const text = value ? "Ja" : "Nei";
  return `<div class="sensor-item ${cls}">
    <span class="sensor-dot ${dot}"></span>
    <span>${label}: <strong>${text}</strong></span>
  </div>`;
}

function errorRow(label, value, okValues) {
  const isOk = !value || okValues.includes(value.toLowerCase());
  const cls  = isOk ? "sensor-ok" : "sensor-warn";
  const dot  = isOk ? "dot-green" : "dot-red";
  const text = isOk ? "Ingen feil" : value;
  return `<div class="sensor-item ${cls}">
    <span class="sensor-dot ${dot}"></span>
    <span>${label}: <strong>${text}</strong></span>
  </div>`;
}

async function load() {
  const res = await fetch(`${SUPA_URL}/rest/v1/biblioteket_roborock_status?select=*&limit=1`, {
    headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
  });
  const [d] = await res.json();

  document.getElementById("last-updated").textContent = `Oppdatert: ${formatDate(d.updated_at)}`;

  const hasError = (d.vacuum_error && d.vacuum_error !== "none")
                || (d.dock_error   && d.dock_error   !== "ok");

  const battery  = d.battery ?? 0;
  const vLabel   = VACUUM_LABELS[d.vacuum_state] ?? d.vacuum_state ?? "—";
  const vColor   = vacuumColor(d.vacuum_state);

  // Hero
  const glow = document.getElementById("robot-glow");
  glow.className = "robot-glow" + (d.vacuum_state === "cleaning" ? " cleaning" : "") + (hasError ? " error" : "");
  document.getElementById("hero-status").textContent = vLabel;
  document.getElementById("hero-status").style.color = vColor;
  document.getElementById("hero-sub").textContent = `Status: ${d.status ?? "—"}`;
  document.getElementById("status-badge").style.background = vColor;
  document.getElementById("next-run-pill").innerHTML = `Neste kjøring: <span>${nextRun()}</span>`;

  // Batteri ring
  const circumference = 289;
  const offset = circumference - (battery / 100) * circumference;
  const arc = document.getElementById("battery-arc");
  arc.style.strokeDashoffset = offset;
  arc.style.stroke = batteryColor(battery);
  document.getElementById("battery-pct").textContent = battery + "%";
  document.getElementById("battery-pct").style.color = batteryColor(battery);
  document.getElementById("charging-label").textContent = d.is_charging ? "⚡ Lader" : "";

  document.getElementById("main").innerHTML = `

    ${hasError ? `<div class="error-banner visible">
      ⚠️ Feil registrert —
      ${d.vacuum_error !== "none" ? `Støvsuger: ${d.vacuum_error}` : ""}
      ${d.dock_error   !== "ok"  ? `Ladestasjon: ${d.dock_error}` : ""}
    </div>` : ""}

    <div class="card">
      <div class="card-title">Siste rengjøring</div>
      <div class="info-row">
        <span class="info-label">Start</span>
        <span class="info-value">${formatDate(d.last_clean_begin)}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Slutt</span>
        <span class="info-value">${formatDate(d.last_clean_end)}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Varighet</span>
        <span class="info-value">${d.cleaning_time_min ? Math.round(d.cleaning_time_min) + " min" : "—"}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Areal</span>
        <span class="info-value">${d.cleaning_area_m2 ? d.cleaning_area_m2 + " m²" : "—"}</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Totalt</div>
      <div class="info-row">
        <span class="info-label">Antall rengjøringer</span>
        <span class="info-value">${d.total_cleaning_count ?? "—"}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Total tid</span>
        <span class="info-value">${d.total_cleaning_time_h ? Math.round(d.total_cleaning_time_h) + " t" : "—"}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Totalt areal</span>
        <span class="info-value">${d.total_cleaning_area_m2 ? Math.round(d.total_cleaning_area_m2) + " m²" : "—"}</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Sensorer</div>
      ${sensorRow("Lader", d.is_charging, false)}
      ${sensorRow("Vannbeholder tom", d.dock_clean_water_empty, true)}
      ${sensorRow("Skittenvannbeholder full", d.dock_dirty_water_full, true)}
      ${errorRow("Feil på støvsuger", d.vacuum_error, ["none"])}
      ${errorRow("Feil på ladestasjon", d.dock_error, ["ok"])}
    </div>
  `;
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
